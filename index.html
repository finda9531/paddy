<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPad Dashboard</title>
    <link rel="apple-touch-icon" href="/static/pad.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-color: #F0F9FF;
            --tile-bg: rgba(255, 255, 255, 0.7);
            --tile-blur: blur(20px);
            --text-main: #1d1d1f;
            --text-sub: #86868b;
            --accent-green: #4CD964;
            --accent-orange: #FF9500;
            --accent-red: #FF3B30;
        }

        body {
            background-color: var(--bg-color);
            font-family: -apple-system, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 120px; 
            gap: 16px;
            width: 90%;
            max-width: 900px;
            padding: 20px;
        }

        .tile {
            background-color: var(--tile-bg);
            backdrop-filter: var(--tile-blur);
            -webkit-backdrop-filter: var(--tile-blur);
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            border: none;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }

        .span-2-col { grid-column: span 2; }
        .span-4-col { grid-column: span 4; }

        .tile-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--text-sub);
            position: absolute;
            top: 15px;
            left: 20px;
            text-transform: uppercase;
            z-index: 2;
        }

        .clock-tile { font-size: 54px; font-weight: 300; letter-spacing: -1px; }

        .weather-tile { position: relative; }
        .weather-bg-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            color: rgba(0, 0, 0, 0.04);
            z-index: 1;
        }
        .weather-info {
            display: flex;
            align-items: baseline;
            gap: 4px;
            margin-top: 10px;
            position: relative;
            z-index: 2;
        }
        .temp-val { font-size: 42px; font-weight: 200; }
        .temp-unit { font-size: 20px; font-weight: 200; }

        .now-playing-panel { align-items: flex-start; padding: 0 25px; }
        #np-title { font-size: 20px; font-weight: 700; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 5px; }
        #np-artist { font-size: 14px; font-weight: 500; color: var(--text-sub); }

        .control-group {
            display: flex;
            flex-direction: row !important;
            justify-content: space-evenly;
            align-items: center;
            width: 100%;
            height: 100%;
            padding-top: 15px; 
            box-sizing: border-box;
        }

        .sub-btn {
            background: rgba(0, 0, 0, 0.04);
            border: none;
            color: var(--text-main);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }
        .sub-btn:active { transform: scale(0.92); }
        .sub-btn i { font-size: 20px; transition: color 0.2s ease; }

        .mute-active {
            background-color: var(--accent-red) !important;
            box-shadow: 0 4px 12px rgba(255, 59, 48, 0.4) !important;
        }
        .mute-active i { color: #ffffff !important; }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 視認性を高めたプログレスバー */
        .sub-btn.loading::after {
            content: "";
            position: absolute;
            top: -3px; 
            left: -3px; 
            right: -3px; 
            bottom: -3px;
            border-radius: 50%;
            /* 背景の軌道（トラック）を敷いて太さを3pxに */
            border: 3px solid rgba(0, 0, 0, 0.1); 
            border-top-color: var(--text-sub);
            animation: spin 800ms linear infinite;
            pointer-events: none;
        }

        /* 赤色背景でのプログレスバー */
        .sub-btn.mute-active.loading::after {
            /* 赤背景に映える半透明の白色トラック */
            border: 3px solid rgba(255, 255, 255, 0.3); 
            border-top-color: #ffffff; /* くっきりした白色 */
        }

        .macro-btn { cursor: pointer; transition: transform 0.1s; border: none; }
        .macro-btn:active { transform: scale(0.95); }
        .btn-content { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .btn-content i { font-size: 32px; color: var(--text-main); }
        .btn-content span { font-size: 12px; font-weight: 600; color: var(--text-sub); }

        .success { background-color: var(--accent-green) !important; }
        .success i, .success span { color: white !important; }
        .connecting { background-color: var(--accent-orange) !important; }
    </style>
</head>
<body>

    <div class="grid-container">
        <div class="tile span-2-col clock-tile" id="clock-display">00:00</div>
        <div class="tile span-2-col weather-tile">
            <div class="tile-label">Matsumoto</div>
            <i id="weather-icon" class="fa-solid fa-cloud weather-bg-icon"></i>
            <div class="weather-info">
                <span class="temp-val" id="weather-temp">--</span>
                <span class="temp-unit">°</span>
            </div>
        </div>

        <div class="tile span-4-col now-playing-panel">
            <div class="tile-label">Now Playing</div>
            <div id="np-title">Not Playing</div>
            <div id="np-artist"></div>
        </div>

        <div class="tile span-2-col">
            <div class="tile-label">Media</div>
            <div class="control-group">
                <button class="sub-btn" onclick="sendCommand('media', 'prevtrack')"><i class="fa-solid fa-backward"></i></button>
                <button class="sub-btn" onclick="sendCommand('media', 'playpause')"><i class="fa-solid fa-play"></i></button>
                <button class="sub-btn" onclick="sendCommand('media', 'nexttrack')"><i class="fa-solid fa-forward"></i></button>
            </div>
        </div>
        <div class="tile span-2-col">
            <div class="tile-label">Volume</div>
            <div class="control-group">
                <button class="sub-btn" onclick="sendCommand('media', 'volumedown')"><i class="fa-solid fa-minus"></i></button>
                <button class="sub-btn" id="mute-btn" onclick="sendCommand('media', 'volumemute')"><i class="fa-solid fa-volume-xmark"></i></button>
                <button class="sub-btn" onclick="sendCommand('media', 'volumeup')"><i class="fa-solid fa-plus"></i></button>
            </div>
        </div>

        <button class="tile macro-btn" onclick="sendUrlCommand('chrome', 'https://www.google.com')">
            <div class="btn-content"><i class="fa-brands fa-chrome"></i><span>Chrome</span></div>
        </button>
        <button class="tile macro-btn" onclick="sendUrlCommand('firefox', 'https://www.youtube.com')">
            <div class="btn-content"><i class="fa-brands fa-youtube"></i><span>YouTube</span></div>
        </button>
        <button class="tile macro-btn" onclick="sendUrlCommand('chrome_app', 'https://x.com')">
            <div class="btn-content"><i class="fa-brands fa-x-twitter"></i><span>X</span></div>
        </button>
        <button class="tile macro-btn" onclick="connectEarphones(event)">
            <div class="btn-content"><i class="fa-solid fa-headphones-simple"></i><span>AirPods</span></div>
        </button>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock-display').textContent = 
                String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
        }
        setInterval(updateClock, 1000); updateClock();

        async function updateNowPlaying() {
            try {
                const res = await fetch('/api/now_playing');
                const data = await res.json();
                document.getElementById('np-title').textContent = data.title || "Not Playing";
                document.getElementById('np-artist').textContent = data.artist || "";
                
                const muteBtn = document.getElementById('mute-btn');
                const muteIcon = muteBtn.querySelector('i');
                
                if (data.is_muted) {
                    muteBtn.classList.add('mute-active');
                    muteIcon.className = 'fa-solid fa-volume-high';
                } else {
                    muteBtn.classList.remove('mute-active');
                    muteIcon.className = 'fa-solid fa-volume-xmark';
                }
            } catch (e) {}
        }
        setInterval(updateNowPlaying, 2000); updateNowPlaying();

        async function updateWeather() {
            try {
                const res = await fetch('/api/weather');
                const data = await res.json();
                document.getElementById('weather-temp').textContent = Math.round(data.temp);
                
                // 昼夜の判定（1=昼, 0=夜）
                const isDay = data.is_day !== 0; 
                
                // 昼夜に応じたシンボルマッピング
                const iconMap = {
                    "Clear": isDay ? "fa-sun" : "fa-moon",
                    "Mainly Clear": isDay ? "fa-cloud-sun" : "fa-cloud-moon",
                    "Partly Cloudy": isDay ? "fa-cloud-sun" : "fa-cloud-moon",
                    "Overcast": "fa-cloud",
                    "Rain": "fa-cloud-showers-heavy",
                    "Snow": "fa-snowflake",
                    "Thunderstorm": "fa-bolt"
                };
                const iconClass = iconMap[data.status] || "fa-cloud";
                const iconElement = document.getElementById('weather-icon');
                iconElement.className = `fa-solid ${iconClass} weather-bg-icon`;
            } catch (e) {}
        }
        setInterval(updateWeather, 600000); updateWeather();

        async function sendCommand(type, target) {
            const btn = event.currentTarget;
            
            if (btn.id === 'mute-btn') {
                btn.classList.add('loading');
                
                try {
                    await fetch('/api/command', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ type: type, target: target })
                    });
                    
                    await new Promise(resolve => setTimeout(resolve, 400));
                    await updateNowPlaying();
                } catch (e) {
                    console.error("Command Error:", e);
                } finally {
                    btn.classList.remove('loading');
                }
            } else {
                fetch('/api/command', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: type, target: target })
                });
                
                btn.style.backgroundColor = 'rgba(0,0,0,0.1)';
                setTimeout(() => btn.style.backgroundColor = '', 200);
            }
        }

        async function sendUrlCommand(browser, url) {
            const btn = event.currentTarget;
            const res = await fetch('/api/command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: 'launch_url', target: { browser: browser, url: url } })
            });
            if (res.ok) {
                btn.classList.add('success');
                setTimeout(() => btn.classList.remove('success'), 400);
            }
        }

        async function connectEarphones(event) {
            const btn = event.currentTarget;
            btn.classList.add('connecting');
            const res = await fetch('/api/bluetooth', { method: 'POST' });
            btn.classList.remove('connecting');
            if (res.ok) {
                btn.classList.add('success');
                setTimeout(() => btn.classList.remove('success'), 400);
            }
        }
    </script>
</body>
</html>
