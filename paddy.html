<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPad Macro Pad</title>
    <style>
        body {
            background-color: #1e1e1e;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 90%;
            max-width: 800px;
        }
        .macro-btn {
            background-color: #3a3a3a;
            border: none;
            border-radius: 12px;
            padding: 30px;
            font-size: 24px;
            color: white;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .macro-btn:active {
            background-color: #555;
        }
        .success {
            background-color: #4CAF50 !important;
        }
        .error {
            background-color: #f44336 !important;
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <button class="macro-btn" onclick="sendCommand('shortcut', 'ctrl,c')">Copy “”Ctrl+C“”</button>
        <button class="macro-btn" onclick="sendCommand('shortcut', 'alt,tab')">Switch App “”Alt+Tab“”</button>
        <button class="macro-btn" onclick="sendCommand('launch', 'notepad.exe')">Launch Notepad</button>
        <button class="macro-btn" onclick="sendCommand('launch', 'calc.exe')">Launch Calc</button>
    </div>

    <script>
        async function sendCommand(type, target) {
            const btn = event.target;
            
            try {
                const response = await fetch('/api/command', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ type: type, target: target })
                });

                if (response.ok) {
                    // 成功時にボタンを緑色にし、500ミリ秒後に元に戻す
                    btn.classList.add('success');
                    setTimeout(() => btn.classList.remove('success'), 500); 
                } else {
                    throw new Error('Server error');
                }
            } catch (error) {
                console.error('Error:', error);
                // エラー時にボタンを赤色にし、500ミリ秒後に元に戻す
                btn.classList.add('error');
                setTimeout(() => btn.classList.remove('error'), 500);
            }
        }
    </script>
</body>
</html>
